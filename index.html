<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream - PeerJS</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    video { width: 100%; border-radius: 10px; margin-top: 20px; background: #000; }
    input { width: 90%; padding: 12px; margin-top: 15px; border-radius: 5px; border: none; text-align: center; }
    .status { color: #00ff00; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
  <h2>Remote Camera Monitor</h2>
  <div id="status" class="status">Connecting to PeerServer...</div>

  <div id="viewer-ui" style="display:none;">
    <p>Yawanna ona link eka (Copy this):</p>
    <input type="text" id="share-link" readonly onclick="this.select()">
  </div>

  <video id="remote-video" autoplay playsinline></video>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const peerIdFromUrl = urlParams.get('id');
  const statusDiv = document.getElementById('status');
  const videoElem = document.getElementById('remote-video');

  const peer = new Peer();

  peer.on('open', (id) => {
    if (!peerIdFromUrl) {
      // VIEWER MODE (PC)
      statusDiv.innerText = "ID Created. Waiting for connection...";
      document.getElementById('viewer-ui').style.display = 'block';
      const link = window.location.href.split('?')[0] + "?id=" + id;
      document.getElementById('share-link').value = link;
    } else {
      // SENDER MODE (Phone)
      statusDiv.innerText = "Connecting to remote device...";
      startCamera(peerIdFromUrl);
    }
  });

  function startCamera(targetId) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
      .then((stream) => {
        statusDiv.innerText = "Streaming live...";
        videoElem.srcObject = stream;
        peer.call(targetId, stream);
      })
      .catch(err => {
        statusDiv.innerText = "Error: Camera permission denied!";
        alert("Please allow camera access!");
      });
  }

  peer.on('call', (call) => {
    call.answer(); // Answer without sending our own stream
    call.on('stream', (remoteStream) => {
      statusDiv.innerText = "Connected! Viewing Remote Cam.";
      videoElem.srcObject = remoteStream;
    });
  });
</script>
</body>
</html>
